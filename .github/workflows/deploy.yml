name: Build and Publish Backend Image

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - "backend/**"

env:
  AWS_REGION: "us-east-1"
  ECR_REPOSITORY: "cropsight-backend"

jobs:
  build-and-push:
    name: Build and push backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare image tags
        id: tags
        shell: bash
        run: |
          {
            echo "tags<<EOF"
            echo "${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}"
            echo "${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_REF_NAME}"
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
