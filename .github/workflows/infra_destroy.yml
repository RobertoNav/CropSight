name: CropSight Destroy Infrastructure

on:
  workflow_dispatch:           # Solo se dispara manualmente desde GitHub Actions
    inputs:
      environment:
        description: "Ambiente a destruir"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      confirm:
        description: 'Escribe "destroy" para confirmar'
        required: true
        type: string

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "us-east-1"
  WORKING_DIR: "./infra"

jobs:
  destroy:
    name: "Terraform Destroy — ${{ github.event.inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment == 'prod' && 'production' || github.event.inputs.environment }}

    steps:
      # ── seguridad ────────────────────────────────────────────────
      - name: Verificar confirmación
        if: github.event.inputs.confirm != 'destroy'
        run: |
          echo "Confirmación incorrecta. Escribe exactamente: destroy"
          exit 1

      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Terraform Init (lee el state del S3 backend) ────────────────────────
      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      # ── Plan del destroy (para ver qué va a borrar antes de hacerlo) ────────
      - name: Terraform Plan Destroy
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: |
          terraform plan \
            -destroy \
            -var-file=environments/${{ github.event.inputs.environment }}.tfvars \
            -no-color \
            -out=destroy.tfplan 2>&1 | tee plan_output.txt

      - name: Mostrar recursos que se van a eliminar
        run: |
          echo "## Recursos a eliminar:" 
          grep -E "^  # |will be destroyed" /tmp/infra/../../../home/runner/work/**/infra/plan_output.txt || \
          cat ${{ env.WORKING_DIR }}/plan_output.txt | grep -E "destroy|Plan:"

      # ── Destroy ─────────────────────────────────────────────────────────────
      - name: Terraform Destroy
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: |
          terraform apply \
            -destroy \
            destroy.tfplan \
            -no-color

      - name: Confirmar destrucción
        run: |
          echo "Infraestructura de ${{ github.event.inputs.environment }} destruida correctamente."
          echo "El state en S3 (cropsight-tfstate) fue actualizado — ya no refleja recursos activos."