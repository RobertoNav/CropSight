name: CropSight Infrastructure

on:
  push:
    branches:
      - main       # Despliega a PROD
      - dev    # Despliega a dev
    paths:
      - 'infra/**' # Solo cuando cambien archivos de infra
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "us-east-1"
  WORKING_DIR: "./infra"

jobs:
  # ── Plan (en PRs — solo previsualiza, no aplica) ──────────────────────────
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan (prod preview)
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: |
          terraform plan \
            -var-file=environments/prod.tfvars \
            -no-color \
            -out=tfplan
        continue-on-error: true

      - name: Comentar el Plan en el PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const output = `### Terraform Plan
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # ── Deploy a dev (push a branch dev) ──────────────────────────────
  deploy-dev:
    name: "Deploy dev"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: dev   # Requiere aprobación manual en GitHub si lo configuras

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply — dev
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: |
          terraform apply \
            -var-file=environments/dev.tfvars \
            -auto-approve \
            -no-color

      - name: Mostrar Outputs
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform output

  # ── Deploy a PROD (push a main) ───────────────────────────────────────────
  deploy-prod:
    name: "Deploy Prod"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production  # Requiere aprobación manual — configúralo en GitHub

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply — Prod
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: |
          terraform apply \
            -var-file=environments/prod.tfvars \
            -auto-approve \
            -no-color

      - name: Mostrar Outputs
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform output