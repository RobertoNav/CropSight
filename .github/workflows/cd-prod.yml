name: CropSight Infrastructure

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "us-east-1"
  WORKING_DIR: "./infra"
  ECR_REPOSITORY: "cropsight-backend"

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="key=prod/terraform.tfstate"

      - name: Terraform Plan (prod preview)
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_github_token: ${{ secrets.TF_VAR_GITHUB_TOKEN }}
        run: |
          terraform plan \
            -var-file=environments/prod.tfvars \
            -no-color \
            -out=tfplan
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const output = `### Terraform Plan
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  deploy-dev:
    name: "Deploy dev"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="key=dev/terraform.tfstate"

      - name: Terraform Apply - dev
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_github_token: ${{ secrets.TF_VAR_GITHUB_TOKEN }}
        run: |
          terraform apply \
            -var-file=environments/dev.tfvars \
            -auto-approve \
            -no-color
      
      - name: Log in to Amazon ECR
        id: login-ecr-dev
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image - dev
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr-dev.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr-dev.outputs.registry }}/${{ env.ECR_REPOSITORY }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Refresh backend instances - dev
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name cropsight-dev-ec2-asg \
            --region "${AWS_REGION}" || true
      
      - name: Show outputs
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform output

  deploy-prod:
    name: "Deploy Prod"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="key=prod/terraform.tfstate"

      - name: Terraform Apply - Prod
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_github_token: ${{ secrets.TF_VAR_GITHUB_TOKEN }}
        run: |
          terraform apply \
            -var-file=environments/prod.tfvars \
            -auto-approve \
            -no-color

      - name: Log in to Amazon ECR
        id: login-ecr-prod
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image - prod
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr-prod.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr-prod.outputs.registry }}/${{ env.ECR_REPOSITORY }}:main
            ${{ steps.login-ecr-prod.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Refresh backend instances - prod
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name cropsight-prod-ec2-asg \
            --region "${AWS_REGION}" || true

      - name: Capture prod endpoint
        id: prod-endpoint
        working-directory: ${{ env.WORKING_DIR }}
        run: echo "alb_dns_name=$(terraform output -raw alb_dns_name)" >> "$GITHUB_OUTPUT"

      - name: Smoke tests
        id: smoke-tests
        continue-on-error: true
        env:
          ALB_DNS_NAME: ${{ steps.prod-endpoint.outputs.alb_dns_name }}
        run: |
          echo "Running smoke tests against http://${ALB_DNS_NAME}/health"
          for attempt in $(seq 1 24); do
            if curl -fsS "http://${ALB_DNS_NAME}/api/v1/health" >/dev/null; then
              echo "Smoke tests passed on attempt ${attempt}"
              exit 0
            fi
            echo "Attempt ${attempt} failed; waiting before retry..."
            sleep 15
          done
          echo "Smoke tests failed after all retries"
          exit 1

      - name: Roll back production deployment
        if: steps.smoke-tests.outcome == 'failure' && github.event.before != '0000000000000000000000000000000000000000'
        working-directory: ${{ github.workspace }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_github_token: ${{ secrets.TF_VAR_GITHUB_TOKEN }}
          PREVIOUS_SHA: ${{ github.event.before }}
        run: |
          echo "Smoke tests failed. Rolling back to commit ${PREVIOUS_SHA}."
          git checkout --force "${PREVIOUS_SHA}"
          cd infra
          terraform init \
            -backend-config="key=prod/terraform.tfstate"
          terraform apply \
            -var-file=environments/prod.tfvars \
            -auto-approve \
            -no-color

      - name: Report rollback requirement
        if: always() && steps.smoke-tests.outcome == 'failure'
        run: |
          echo "Production smoke tests failed."
          echo "Rollback was attempted above. Marking the workflow as failed."
          exit 1

      - name: Show outputs
        if: success()
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform output